# SonarCloud configuration. The organization key and project key are
# whatever you pick when importing the repo on sonarcloud.io — the
# defaults below match the GitHub-org-import convention. Change them
# in lock-step if you choose differently.
sonar.organization=brikalabs
sonar.projectKey=brikalabs_clay
sonar.projectName=Clay
sonar.projectVersion=0.0.1

# What to scan. Both the Clay package source and the Astro docs site.
sonar.sources=src,docs/src,scripts

# Tests live alongside source under __tests__ folders.
sonar.tests=src
sonar.test.inclusions=**/__tests__/**/*.ts,**/__tests__/**/*.tsx,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Don't analyze build artifacts, vendored output, generated code, or
# one-shot migration tooling whose lifecycle is "ran once, kept for
# reference."
sonar.exclusions=**/node_modules/**,**/dist/**,**/.astro/**,**/coverage/**,**/*.d.ts,docs/dist/**,**/*.min.js,**/*.min.css,scripts/migrate-*.ts,scripts/upgrade-*.ts,scripts/repair-*.ts,scripts/fill-*.ts

# JavaScript/TypeScript engine settings.
sonar.sourceEncoding=UTF-8

# Coverage — emitted by `bun test --coverage` in CI as lcov.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage measurement exclusions. Files that are out of reach of the
# current test runner (Bun + bun:test) are excluded so the coverage
# gate reflects what's actually testable today, not the absence of a
# component-testing setup.
#  - *.demos.tsx — showcase JSX, not testable code
#  - src/components/**/*.tsx — React components; need RTL or similar
#  - docs/src/components/** + docs/src/pages/** — Astro/React UI in docs
#  - docs/src/lib/component-registry.ts — uses Vite's import.meta.glob
#  - docs/src/lib/vite-plugin-clay-docgen.ts — Vite plugin body relies
#    on Vite dev-server APIs; pure helpers extracted to other files are
#    covered.
sonar.coverage.exclusions=**/*.demos.tsx,src/components/**/*.tsx,docs/src/components/**,docs/src/pages/**,docs/src/lib/component-registry.ts,docs/src/lib/vite-plugin-clay-docgen.ts,docs/src/lib/component-markdown.ts

# Per-file rule suppressions for legitimate W3C ARIA patterns that the
# generic JSX-A11Y rules can't recognize.
sonar.issue.ignore.multicriteria=carouselSlideRole,tooltipDisabledButton

# CarouselItem uses `role="group"` with `aria-roledescription="slide"` —
# the W3C APG carousel pattern. There is no semantic HTML element that
# expresses "slide group", so the generic S6819 fix (fieldset, details,
# etc.) doesn't apply.
sonar.issue.ignore.multicriteria.carouselSlideRole.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.carouselSlideRole.resourceKey=src/components/carousel/carousel.tsx

# Disabled buttons don't fire pointer/focus events, so the standard
# tooltip workaround wraps them in a focusable span. S6845 doesn't
# recognize the pattern.
sonar.issue.ignore.multicriteria.tooltipDisabledButton.ruleKey=typescript:S6845
sonar.issue.ignore.multicriteria.tooltipDisabledButton.resourceKey=src/components/tooltip/tooltip.demos.tsx
